<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دستیار محتوای هوشمند</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Vazirmatn', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
  }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo span { color: #7c6af7; }

  .badge-free {
    background: #7c6af7;
    color: #fff;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
  }

  main {
    max-width: 800px;
    margin: 2.5rem auto;
    padding: 0 1rem;
  }

  .hero {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .hero h1 {
    font-size: 2rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 0.5rem;
  }

  .hero p {
    color: #666;
    font-size: 1rem;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 1.8rem;
    border: 1px solid #e8e6e0;
    margin-bottom: 1.5rem;
  }

  .section-label {
    font-size: 13px;
    font-weight: 500;
    color: #888;
    margin-bottom: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .types-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .type-btn {
    border: 1.5px solid #e8e6e0;
    background: #fafaf8;
    border-radius: 10px;
    padding: 0.9rem 0.5rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 13px;
    color: #444;
  }

  .type-btn:hover { border-color: #7c6af7; color: #7c6af7; background: #f0eeff; }

  .type-btn.active {
    border-color: #7c6af7;
    background: #f0eeff;
    color: #5a47d6;
    font-weight: 500;
  }

  .type-icon { font-size: 22px; display: block; margin-bottom: 6px; }

  textarea {
    width: 100%;
    border: 1.5px solid #e8e6e0;
    border-radius: 10px;
    padding: 1rem;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 14px;
    resize: vertical;
    min-height: 100px;
    color: #1a1a1a;
    background: #fafaf8;
    outline: none;
    transition: border-color 0.15s;
    direction: rtl;
  }

  textarea:focus { border-color: #7c6af7; background: #fff; }

  .tone-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .tone-chip {
    border: 1.5px solid #e8e6e0;
    background: #fafaf8;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Vazirmatn', sans-serif;
    color: #555;
    transition: all 0.15s;
  }

  .tone-chip:hover { border-color: #7c6af7; color: #7c6af7; }
  .tone-chip.active { border-color: #7c6af7; background: #f0eeff; color: #5a47d6; font-weight: 500; }

  .generate-btn {
    width: 100%;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 1rem;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Vazirmatn', sans-serif;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    margin-top: 1rem;
  }

  .generate-btn:hover { background: #2d2d50; }
  .generate-btn:active { transform: scale(0.99); }
  .generate-btn:disabled { background: #aaa; cursor: not-allowed; }

  .result-card {
    background: #fff;
    border-radius: 16px;
    border: 1.5px solid #7c6af7;
    padding: 1.5rem;
    display: none;
  }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .result-label {
    font-size: 13px;
    color: #7c6af7;
    font-weight: 500;
  }

  .copy-btn {
    border: 1px solid #e8e6e0;
    background: #fafaf8;
    border-radius: 8px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Vazirmatn', sans-serif;
    color: #555;
    transition: all 0.15s;
  }

  .copy-btn:hover { background: #f0eeff; border-color: #7c6af7; color: #5a47d6; }

  #result-text {
    line-height: 1.9;
    font-size: 14.5px;
    color: #222;
    white-space: pre-wrap;
  }

  .loading {
    text-align: center;
    padding: 2rem;
    color: #888;
    display: none;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #e8e6e0;
    border-top-color: #7c6af7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .usage-bar {
    background: #f5f4f0;
    border-radius: 12px;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    border: 1px solid #e8e6e0;
  }

  .usage-info { font-size: 13px; color: #666; }
  .usage-count { font-weight: 700; color: #1a1a2e; font-size: 1.1rem; }

  .upgrade-link {
    background: #7c6af7;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
  }

  footer {
    text-align: center;
    padding: 2rem;
    color: #aaa;
    font-size: 12px;
  }

  .error-msg {
    background: #fff0f0;
    border: 1px solid #f0c0c0;
    border-radius: 10px;
    padding: 0.8rem 1rem;
    font-size: 13px;
    color: #c00;
    margin-top: 0.8rem;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">دستیار<span>AI</span></div>
  <span class="badge-free">نسخه رایگان — ۵ بار در روز</span>
</header>

<main>
  <div class="hero">
    <h1>محتوای حرفه‌ای بساز</h1>
    <p>با هوش مصنوعی، در چند ثانیه محتوای فارسی آماده کن</p>
  </div>

  <div class="usage-bar">
    <div>
      <div class="usage-info">استفاده امروز</div>
      <div class="usage-count"><span id="used-count">0</span> از ۵</div>
    </div>
    <a href="#" class="upgrade-link" onclick="alert('به زودی فعال می‌شود!')">اشتراک نامحدود ۴۹،۰۰۰ تومان</a>
  </div>

  <div class="card">
    <div class="section-label">نوع محتوا را انتخاب کن</div>
    <div class="types-grid">
      <button class="type-btn active" data-type="instagram" onclick="selectType(this)">
        <span class="type-icon">📸</span>پست اینستاگرام
      </button>
      <button class="type-btn" data-type="caption" onclick="selectType(this)">
        <span class="type-icon">✍️</span>کپشن و بیو
      </button>
      <button class="type-btn" data-type="product" onclick="selectType(this)">
        <span class="type-icon">🛍️</span>توضیح محصول
      </button>
      <button class="type-btn" data-type="email" onclick="selectType(this)">
        <span class="type-icon">📧</span>ایمیل فروش
      </button>
      <button class="type-btn" data-type="article" onclick="selectType(this)">
        <span class="type-icon">📝</span>مقاله کوتاه
      </button>
      <button class="type-btn" data-type="ad" onclick="selectType(this)">
        <span class="type-icon">📣</span>متن تبلیغاتی
      </button>
    </div>

    <div class="section-label">موضوع یا توضیح کوتاه بنویس</div>
    <textarea id="topic" placeholder="مثلاً: فروش کیف چرم دست‌دوز با تخفیف ویژه نوروز..."></textarea>

    <div class="section-label" style="margin-top:1rem;">لحن محتوا</div>
    <div class="tone-row">
      <button class="tone-chip active" onclick="selectTone(this)" data-tone="رسمی">رسمی</button>
      <button class="tone-chip" onclick="selectTone(this)" data-tone="دوستانه">دوستانه</button>
      <button class="tone-chip" onclick="selectTone(this)" data-tone="انگیزشی">انگیزشی</button>
      <button class="tone-chip" onclick="selectTone(this)" data-tone="طنزآمیز">طنزآمیز</button>
      <button class="tone-chip" onclick="selectTone(this)" data-tone="تخصصی">تخصصی</button>
    </div>

    <button class="generate-btn" id="gen-btn" onclick="generate()">✨ تولید محتوا</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>در حال نوشتن محتوا...</p>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-header">
      <span class="result-label">✅ محتوای آماده شده</span>
      <button class="copy-btn" onclick="copyResult()">کپی کردن</button>
    </div>
    <div id="result-text"></div>
  </div>
</main>

<footer>ساخته شده با ❤️ — نسخه آزمایشی</footer>

<script>
let selectedType = 'instagram';
let selectedTone = 'رسمی';
let usedToday = parseInt(localStorage.getItem('used_' + new Date().toDateString()) || '0');

document.getElementById('used-count').textContent = usedToday;

const typeLabels = {
  instagram: 'پست اینستاگرام',
  caption: 'کپشن و بیو',
  product: 'توضیح محصول',
  email: 'ایمیل فروش',
  article: 'مقاله کوتاه',
  ad: 'متن تبلیغاتی'
};

function selectType(el) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedType = el.dataset.type;
}

function selectTone(el) {
  document.querySelectorAll('.tone-chip').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedTone = el.dataset.tone;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

async function generate() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) { showError('لطفاً موضوع را بنویس.'); return; }

  if (usedToday >= 5) {
    showError('سقف روزانه رایگان (۵ بار) تموم شده. برای استفاده نامحدود اشتراک بگیر.');
    return;
  }

  hideError();
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result-card').style.display = 'none';

  const prompts = {
    instagram: `یک پست اینستاگرام حرفه‌ای فارسی برای موضوع زیر بنویس. شامل متن اصلی، هشتگ‌های مرتبط (۵ تا ۱۰ تا) و یک call-to-action باشد. لحن: ${selectedTone}.`,
    caption: `یک کپشن جذاب فارسی برای صفحه اینستاگرام یا بیو در مورد موضوع زیر بنویس. خلاصه، قوی و به‌یادماندنی. لحن: ${selectedTone}.`,
    product: `یک توضیح محصول حرفه‌ای و متقاعدکننده فارسی برای محصول زیر بنویس. شامل مزایا، ویژگی‌ها و دلیل خرید. لحن: ${selectedTone}.`,
    email: `یک ایمیل فروش فارسی برای موضوع زیر بنویس. شامل موضوع ایمیل، متن اصلی و call-to-action قوی. لحن: ${selectedTone}.`,
    article: `یک مقاله کوتاه (۲۰۰ تا ۳۰۰ کلمه) فارسی درباره موضوع زیر بنویس. با مقدمه، بدنه و نتیجه‌گیری. لحن: ${selectedTone}.`,
    ad: `یک متن تبلیغاتی کوتاه و تاثیرگذار فارسی برای موضوع زیر بنویس. برای تبلیغات دیجیتال مناسب باشد. لحن: ${selectedTone}.`
  };

  const systemPrompt = `تو یک نویسنده محتوای حرفه‌ای فارسی هستی. محتوای خلاقانه، طبیعی و بدون اشتباه می‌نویسی. فقط محتوای خواسته شده را بنوس، بدون توضیح اضافه.`;

  try {
    const API_KEY = 'sk-e7a52dd5cf2247c6b72083568d2d1e54';
    const response = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}` 
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        max_tokens: 1000,
        messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: prompts[selectedType] + '\n\nموضوع: ' + topic }
        ]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'خطای سرور');
    }

    const data = await response.json();
    const text = data.choices?.[0]?.message?.content || 'خطا در دریافت پاسخ';
    console.log('Gemini response:', JSON.stringify(data));

    document.getElementById('result-text').textContent = text;
    document.getElementById('result-card').style.display = 'block';

    usedToday++;
    localStorage.setItem('used_' + new Date().toDateString(), usedToday);
    document.getElementById('used-count').textContent = usedToday;

  } catch (err) {
    showError('خطا: ' + (err.message || 'خطا در اتصال به سرور. دوباره تلاش کن.'));
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('gen-btn').disabled = false;
}

function copyResult() {
  const text = document.getElementById('result-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ کپی شد!';
    setTimeout(() => btn.textContent = 'کپی کردن', 2000);
  });
}
</script>
</body>
</html>
